<ion-row>

  <ion-col size="12">
    <ion-card class="card-pub slide-in-right">
      <ion-card-content>
          Contenido Publicitario
      </ion-card-content>
    </ion-card>
  </ion-col>

  <ion-col size="12">
    <ion-row>
        <ion-col size="4" class="slide-in-left">
          <button class="button-more-sm"  color="primary" fill="outline" expand="block" (click)="navigate('/new-venta')">
            <ion-icon name="cash"></ion-icon>
            Abrir / cerrar caja
          </button>
        </ion-col>

        <ion-col size="4" class="slide-in-left">
          <button class="button-more-sm"  color="primary" fill="outline" expand="block" (click)="navigate('/new-venta')">
            <ion-icon name="bag-add"></ion-icon>
            Nuevo item
          </button>
        </ion-col>

        <ion-col size="4" class="slide-in-left">
          <button class="button-more-sm"  color="primary" fill="outline" expand="block" (click)="navigate('/new-venta')">
            <ion-icon name="stats-chart"></ion-icon>
            Reportes
          </button>
        </ion-col>
    </ion-row>
  </ion-col>


  <ion-col size="12">
    <ion-row>
        <ion-col class="slide-in-left">
          <button class="button-more"  color="primary" fill="outline" expand="block" (click)="navigate('/new-venta')">
            <ion-icon name="add-circle"></ion-icon>
            Venta Flash</button>
        </ion-col>
    </ion-row>
  </ion-col>



  <ion-col size="12">
    <ion-card class="card-info slide-in-left">
      <div class="wave-inv"></div>
      <ion-card-content>
         <div class="card-header">
            <ion-icon name="wallet-outline" class="icon-wallet"></ion-icon> 
            <ion-label>Ingresos Semanales</ion-label>
         </div>
         <div>
            <ion-label class="font-large">250.000,00 Bs</ion-label>
         </div>
      </ion-card-content>
    </ion-card>
  </ion-col>

  <ion-col size="12">

    <ion-row class="ion-justify-content-space-between justify-content-center-xs">
      <ion-col size-sm="5" size-xs="12">
        <ion-card class="card-info-sm bg-1 slide-in-left">
          
          <ion-card-content>
             <div class="card-header">
                <ion-label><ion-icon name="calendar-number-outline"></ion-icon> Fecha:</ion-label>
             </div>
             <div>
                <ion-label>03/03/2026</ion-label>
             </div>
          </ion-card-content>
        </ion-card>
      </ion-col>

      <ion-col size-sm="5" size-xs="12">
        <ion-card class="card-info-sm  bg-2 slide-in-left">
          
          <ion-card-content>
             <div class="card-header">
                <ion-label><ion-icon name="analytics-outline"></ion-icon> Tasa</ion-label>
             </div>
             <div>
                <ion-label>420,57 Bs</ion-label>
             </div>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>

  </ion-col>

  <!--ion-col size-sm="6" size-xs="12" class="padding-0 margin-0">
    <div class="card slide-in-left">
      
      <div class="card-desc">
      <div class="card-header">
      <div class="card-title">Fecha: </div>
      </div>
      <div class="card-time">{{date}}</div>
    </div></div>
  </ion-col-->



  <ion-col size="12">
    <ion-accordion-group [value]="'first'">
      <ion-accordion value="first" >
        <ion-item slot="header"  class="header-accordion" >
          <ion-label><ion-icon name="bar-chart"></ion-icon> Estadisticas</ion-label>
        </ion-item>
        <div class="padding-top-3 body-accordion" slot="content">
              <ion-row class="ion-align-items-start">
                  <ion-col class="chart-container" size="6">
                    <cantidad-ventas title="Ingresos de Ventas" [data]="dataVentas" startColor="#039D45"></cantidad-ventas>
                  </ion-col>

                  <ion-col class="chart-container" size="6">
                    <cantidad-ventas title="Ingresos de Pedidos" [data]="dataPedidos" startColor="#0050d1"></cantidad-ventas>
                  </ion-col>

                  <ion-col class="chart-container margin-top-2" size="12">
                    <stock-items></stock-items>
                  </ion-col>
              </ion-row>
        </div>
      </ion-accordion>
      <ion-accordion value="second" [disabled]="true">
        <ion-item slot="header" color="light">
          <ion-label>Estadisticas +</ion-label>
        </ion-item>
        <div class="ion-padding " slot="content">Second Content</div>
      </ion-accordion>
    </ion-accordion-group>
  </ion-col>

</ion-row>
