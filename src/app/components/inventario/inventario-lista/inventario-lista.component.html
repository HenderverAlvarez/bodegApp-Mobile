
<ion-row class="ion-justify-content-space-around ion-align-items-center">
  <ion-col size="12">
    <ion-searchbar (input)="filterItems($event)" debounce="700" class="ion-text-left" show-clear-button="always" clear-icon="trash-bin" placeholder="Buscar producto"></ion-searchbar>
  </ion-col>
</ion-row>


<ion-row class="ion-justify-content-center margin-top-2" *ngIf="loading">
  <ion-col size="auto">
    <ion-spinner name="crescent" color="primary" ></ion-spinner>
  </ion-col>
</ion-row>

<ion-row class="ion-justify-content-center margin-top-3" *ngIf="mensaje != ''">
  <ion-col size="auto">
    <ion-label  color="tertiary" class="ion-text-center text-bold d-block" >{{mensaje}}</ion-label>
  </ion-col>
</ion-row>

<ion-row class="ion-justify-content-space-around">
  <ion-col *ngFor="let producto of productos" size="8">
    <product-card [id]="producto.uuid" [product]="producto" [hideCantidad]="true"></product-card>
    <ion-popover size="cover" [trigger]="producto.uuid" side="top" alignment="center" triggerAction="click">
      <ng-template>
        <ion-content>
          <ion-list class="w-auto">
            <ion-item (click)="openModal(producto)" class="edit-pop slide-in-left">
              <ion-icon name="pencil"></ion-icon>
              <ion-label>Editar</ion-label>
            </ion-item>

            <!--ion-item class="edit-pop slide-in-right">
              <ion-icon name="trash-bin"></ion-icon>
              <ion-label>Deshabilitar</ion-label>
            </ion-item-->
          </ion-list>
        </ion-content>
      </ng-template>
    </ion-popover>
  </ion-col>
</ion-row>
