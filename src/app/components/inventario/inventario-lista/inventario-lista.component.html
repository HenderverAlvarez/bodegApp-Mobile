
<ion-row class="ion-justify-content-space-around ion-align-items-center">
  <ion-col size="12">
    <form action="" [formGroup]="editForm">
      <ion-searchbar formControlName="search" (input)="filterItems($event)" debounce="700" class="ion-text-left" show-clear-button="always" clear-icon="trash-bin" placeholder="Buscar producto"></ion-searchbar>
    </form>
  </ion-col>
</ion-row>

<ion-row class="ion-justify-content-center" *ngIf="pages.length > 1">
  <ion-col size="auto">
      <ion-button class="btn-pagination" (click)="prevPage()" [disabled]="actualPage == 1">
        <ion-icon name="chevron-back"></ion-icon>
      </ion-button>
  </ion-col>
  <ion-col size="auto" *ngFor="let page of pages; let i = index">
    <ion-button class="btn-pagination" (click)="setPage(i+1)" [ngClass]="actualPage === (i+1) ? 'bg-primary' : 'bg-tertiary'">
      <ion-label>{{i+1}}</ion-label>
    </ion-button>
  </ion-col>
  <ion-col size="auto">
    <ion-button class="btn-pagination" [disabled]="actualPage == pages.length" (click)="nextPage()">
      <ion-icon name="chevron-forward"></ion-icon>
    </ion-button>
  </ion-col>
</ion-row>

<ion-row class="ion-justify-content-center margin-top-2" *ngIf="loading">
  <ion-col size="auto">
    <ion-spinner name="crescent" color="primary" ></ion-spinner>
  </ion-col>
</ion-row>

<ion-row class="ion-justify-content-center margin-top-3" *ngIf="mensaje != ''">
  <ion-col size="auto">
    <ion-label  color="tertiary" class="ion-text-center text-bold d-block" >{{mensaje}}</ion-label>
  </ion-col>
</ion-row>

<ion-row class="ion-justify-content-space-around">

  <ion-col *ngFor="let producto of productos" size="8">
    <product-card [id]="producto.uuid" [product]="producto" [hideCantidad]="true"></product-card>
    <ion-popover size="cover" [trigger]="producto.uuid"  side="right" alignment="top" triggerAction="click">
      <ng-template>
        <ion-content class="">
          <ion-grid>
            <ion-row (click)="openModalStock(producto)">
              <ion-col class="edit-pop">
                <ion-icon name="bag-add"></ion-icon>
                <ion-label>Recargar Stock</ion-label>
              </ion-col>
            </ion-row>
            <ion-row (click)="openModal(producto)">
              <ion-col class="edit-pop">
                <ion-icon name="pencil"></ion-icon>
                <ion-label>Editar</ion-label>
              </ion-col>
            </ion-row>
          </ion-grid>
        </ion-content>
      </ng-template>
    </ion-popover>
  </ion-col>
</ion-row>
