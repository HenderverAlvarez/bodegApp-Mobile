<ion-content>
  <ion-header>
    <ion-toolbar>
      <ion-title>Editar producto</ion-title>
      <ion-buttons slot="end">
        <ion-button (click)="dismissModal()">
          <ion-icon name="close"></ion-icon>
        </ion-button>
      </ion-buttons>
    </ion-toolbar>
  </ion-header>

  <ion-content class="ion-padding">

    <ion-grid class="margin-top-2">
      <ion-row  *ngIf="step == 'info'">
        <ion-col size="12">
          <form [formGroup]="editForm">
            
            <ion-item>
              <ion-label position="floating">Descripción</ion-label>
              <ion-input formControlName="descripcion"></ion-input>
            </ion-item>

            <ion-item>
              <ion-label position="floating">Precio USD</ion-label>
              <ion-input type="number" formControlName="precio_usd"></ion-input>
            </ion-item>
      
            <ion-item>
              <ion-label position="floating">Precio Bs</ion-label>
              <ion-input type="number" formControlName="precio"></ion-input>
            </ion-item>
      
            <ion-item>
              <ion-select label="Unidad de medida" formControlName="unidad_medida" placeholder="U. de medida">
                <ion-select-option value="kg">Kg</ion-select-option>
                <ion-select-option value="unidades">unidades</ion-select-option>
              </ion-select>
            </ion-item>

            <ion-item>
              <ion-label position="floating">Stock</ion-label>
              <ion-input formControlName="stock"></ion-input>
            </ion-item>

            <ion-row class="justify-content-space-around ion-align-items-center margin-top-2">
              
              <ion-col>
                <button class="button-more-sm"  (click)="dismissModal()">Cancelar</button>
              </ion-col>

              <ion-col>
                <button class="button-more-sm" [disabled]="editForm.invalid" (click)="nexStep()">Siguiente</button>
              </ion-col>
            </ion-row>
          </form>
        </ion-col>
      </ion-row>


      <ion-row  *ngIf="step == 'foto'">
        <ion-col size="12">
          <form [formGroup]="editForm">


            <ion-row class="ion-justify-content-space-around slide-in-left margin-top-2" *ngIf="step == 'foto'">
                <ion-col size="10">
                  <label for="file" class="custum-file-upload">
                    <div class="icon" *ngIf="imagePreview">
                      <img [src]="imagePreview" style="max-width: 100%;" />
                    </div>
                    <div class="icon" *ngIf="!imagePreview">
                      <svg viewBox="0 0 24 24" fill="#fff" xmlns="http://www.w3.org/2000/svg"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path fill-rule="evenodd" clip-rule="evenodd" d="M10 1C9.73478 1 9.48043 1.10536 9.29289 1.29289L3.29289 7.29289C3.10536 7.48043 3 7.73478 3 8V20C3 21.6569 4.34315 23 6 23H7C7.55228 23 8 22.5523 8 22C8 21.4477 7.55228 21 7 21H6C5.44772 21 5 20.5523 5 20V9H10C10.5523 9 11 8.55228 11 8V3H18C18.5523 3 19 3.44772 19 4V9C19 9.55228 19.4477 10 20 10C20.5523 10 21 9.55228 21 9V4C21 2.34315 19.6569 1 18 1H10ZM9 7H6.41421L9 4.41421V7ZM14 15.5C14 14.1193 15.1193 13 16.5 13C17.8807 13 19 14.1193 19 15.5V16V17H20C21.1046 17 22 17.8954 22 19C22 20.1046 21.1046 21 20 21H13C11.8954 21 11 20.1046 11 19C11 17.8954 11.8954 17 13 17H14V16V15.5ZM16.5 11C14.142 11 12.2076 12.8136 12.0156 15.122C10.2825 15.5606 9 17.1305 9 19C9 21.2091 10.7909 23 13 23H20C22.2091 23 24 21.2091 24 19C24 17.1305 22.7175 15.5606 20.9844 15.122C20.7924 12.8136 18.858 11 16.5 11Z"></path> </g></svg>
                    </div>
                    <div class="text">
                      <span >Cargar imagen del producto</span>
                      </div>
                      <input (input)="setImage($event)" id="file" type="file">
                    </label>                    
                </ion-col>
            </ion-row>

          <ion-row *ngIf="errorImagen != '' && step == 'foto'">
            <ion-label color="warning" size="large" class="ion-text-center">{{errorImagen}}</ion-label>
          </ion-row>

            <ion-row class="justify-content-space-around ion-align-items-center margin-top-2">
              
              <ion-col>
                <button class="button-more-sm"  (click)="dismissModal()">Atras</button>
              </ion-col>

              <ion-col>
                <button class="button-more-sm" [disabled]="editForm.invalid" (click)="onSubmit()">Guardar Cambios</button>
              </ion-col>
            </ion-row>
          </form>
        </ion-col>
      </ion-row>
    </ion-grid>

    <div class="wave-inv"></div>

    <ion-toast color="tertiary" cssClass="toast" [isOpen]="isToastOpen"  (didDismiss)="setOpen()" [message]="mensajeToast" [duration]="2500"></ion-toast>
  </ion-content>
</ion-content>
