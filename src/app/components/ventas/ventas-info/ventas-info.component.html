
<ion-refresher slot="fixed" (ionRefresh)="getVentas($event)">
  <ion-refresher-content></ion-refresher-content>
</ion-refresher>

<ion-grid class="margin-top-1">
  <!--ion-row class="ion-justify-content-start margin-bottom-2">
    <ion-col size="auto">
      <ion-label class="text-primary text-left text-large text-bold" >Ventas Recientes</ion-label>
    </ion-col>
  </ion-row-->
  <ion-row class="ion-align-items-center" *ngIf="loading">
    <ion-col size="12" class=""> 
      <ion-skeleton-text *ngIf="loading" animated style="width: 100%; height: 150px;"></ion-skeleton-text>
    </ion-col>
  </ion-row>

  <ion-row class="ion-align-items-center" *ngIf="!loading">
    <ion-col size="12" class=""> 
      <ion-card *ngIf="ventasData.length == 0"class="card-venta slide-in-left">
        <ion-card-header>
          <ion-card-title class="text-center text-primary text-small ">No has registrado ventas aún. ¡Comienza a registrar tus ventas para verlas aquí!</ion-card-title> 
        </ion-card-header>
      </ion-card>
      <card-venta *ngFor="let venta of ventasData" [venta]="venta"></card-venta>
    </ion-col>
  </ion-row>

  <ion-row class="ion-justify-content-center slide-in-right">
    <ion-col size="10">
      <div class="card-nav-sm" (click)="navigate('/ventas-lista')">
        <p class="card-title">Ver todas</p>
        <div class="go-corner">
          <div class="go-arrow">
            <ion-icon size="large" name="arrow-forward-circle-outline"></ion-icon>
          </div>
        </div>
      </div>
    </ion-col>

  </ion-row>
  <!--ion-row class="ion-justify-content-center margin-top-2">
    <ion-col size="auto">
      <div class="paginator-container">
        <button class="button-app margin-right-1">«</button>
        <span class="paginator-page text-primary">Página 1 de 5</span>
        <button class="button-app margin-left-1">»</button>
      </div>
    </ion-col>
  </ion-row-->
</ion-grid>
