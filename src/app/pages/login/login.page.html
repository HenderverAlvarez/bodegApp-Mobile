<ion-content [fullscreen]="true" >
  <div class="login-background">
    <ion-grid class="padding-top-4">
      <ion-row>
          <ion-col>
            <ion-card class="form-card">
              <div class="wave-inv"></div>
              <ion-card-header>
                <ion-card-title class="text-center font-title margin-top-3 margin-bottom-1">Inicio de sesión</ion-card-title>
              </ion-card-header>
              <ion-card-content>

                <form [formGroup]="profileForm">
                  <div class="input-container">
                    <ion-icon name="person-outline" class="xs-hide" color="primary"></ion-icon>
                    <app-input label="Usuario" type="text" [controlName]="profileForm.controls['user']"></app-input>
                  </div>
  
                  <div class="input-container">
                    <ion-icon name="lock-closed-outline" class="xs-hide" color="primary"></ion-icon>

                    <app-input label="Contraseña" type="password" [controlName]="profileForm.controls['password']"></app-input>
                  </div>

                  <ion-label class="ion-text-center margin-top-1" color="danger" *ngIf="error != ''">{{error}}</ion-label>

                  
                  <button expand="full" class="button-more full-width margin-top-3 margin-bottom-3" [disabled]="profileForm.status == 'INVALID' || loading" (click)="logIn()">
                    <span *ngIf="!loading">Ingresar</span>
                    <ion-spinner size="small" name="circles" *ngIf="loading"></ion-spinner>
                  </button>                  
                </form>
                
              </ion-card-content>
            </ion-card>
          </ion-col>
      </ion-row>

      <ion-row class="margin-top-1">
        <ion-col size="12">
          <ion-card class="form-card">
            <ion-card-content  (click)="goTo('/register')" class="ion-text-center">
              <ion-label>Olvidaste tu contraseña?. <a>Ingresa Aqui</a></ion-label>
            </ion-card-content>
          </ion-card>
        </ion-col>

        <ion-col>
          <ion-card class="form-card">
            <ion-card-content (click)="goTo('/register')" class="ion-text-center">
              <ion-label>No tienes una cuenta?. <a>Registrate</a></ion-label>
            </ion-card-content>
          </ion-card>
        </ion-col>
      </ion-row>

      <ion-row class="">
        
      </ion-row>
    </ion-grid>
  </div>
</ion-content>
