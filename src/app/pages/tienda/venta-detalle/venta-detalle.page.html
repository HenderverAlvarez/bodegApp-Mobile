<ion-content [fullscreen]="true">
  <app-header title="Nueva orden"></app-header>


  <ion-grid class="margin-top-4">
    <ion-row class="ion-justify-content-space-between position-relative">
      <div class="wave-inv"></div>

      <ion-col size="auto" class="margin-top-4">
        <div>
          <ion-chip (click)="goTo('ventas-lista')" color="primary"><ion-icon class="margin-right-1" name="arrow-back"></ion-icon> Regresar</ion-chip>
        </div>
     </ion-col>

    </ion-row>

    <ion-row class="ion-justify-content-center margin-top-1">
      <ion-col size="12" *ngIf="loading">
        <ion-card class="card-venta slide-in-left">
          <ion-card-content>
            <ion-row>
              <ion-col>
                <ion-list>
                  <ion-list-header>
                    <ion-skeleton-text [animated]="true" style="width: 80%;"></ion-skeleton-text>
                  </ion-list-header>

                    <ion-label>
                      <h3>
                        <ion-skeleton-text [animated]="true" style="width: 80%;"></ion-skeleton-text>
                      </h3>
                      <p>
                        <ion-skeleton-text [animated]="true" style="width: 60%;"></ion-skeleton-text>
                      </p>
                      <p>
                        <ion-skeleton-text [animated]="true" style="width: 30%;"></ion-skeleton-text>
                      </p>
                      <p>
                        <ion-skeleton-text [animated]="true" style="width: 60%;"></ion-skeleton-text>
                      </p>
                      <h3>
                        <ion-skeleton-text [animated]="true" style="width: 80%;"></ion-skeleton-text>
                      </h3>
                      <h3>
                        <ion-skeleton-text [animated]="true" style="width: 80%;"></ion-skeleton-text>
                      </h3>
                      <h3>
                        <ion-skeleton-text [animated]="true" style="width: 80%;"></ion-skeleton-text>
                      </h3>
                      <p>
                        <ion-skeleton-text [animated]="true" style="width: 60%;"></ion-skeleton-text>
                      </p>
                      <p>
                        <ion-skeleton-text [animated]="true" style="width: 60%;"></ion-skeleton-text>
                      </p>
                    </ion-label>
                </ion-list>
              </ion-col>
            </ion-row>

            <ion-row>
              <ion-col>
                <ion-list>
                  <ion-item>
                    <ion-thumbnail slot="start">
                      <ion-skeleton-text [animated]="true"></ion-skeleton-text>
                    </ion-thumbnail>
                    <ion-label>
                      <h3>
                        <ion-skeleton-text [animated]="true" style="width: 80%;"></ion-skeleton-text>
                      </h3>
                      <h3>
                        <ion-skeleton-text [animated]="true" style="width: 80%;"></ion-skeleton-text>
                      </h3>
                      <h3>
                        <ion-skeleton-text [animated]="true" style="width: 80%;"></ion-skeleton-text>
                      </h3>
                    </ion-label>
                  </ion-item>

                  <ion-item>
                    <ion-thumbnail slot="start">
                      <ion-skeleton-text [animated]="true"></ion-skeleton-text>
                    </ion-thumbnail>
                    <ion-label>
                      <h3>
                        <ion-skeleton-text [animated]="true" style="width: 80%;"></ion-skeleton-text>
                      </h3>
                      <h3>
                        <ion-skeleton-text [animated]="true" style="width: 80%;"></ion-skeleton-text>
                      </h3>
                      <h3>
                        <ion-skeleton-text [animated]="true" style="width: 80%;"></ion-skeleton-text>
                      </h3>
                    </ion-label>
                  </ion-item>

                  <ion-item>
                    <ion-thumbnail slot="start">
                      <ion-skeleton-text [animated]="true"></ion-skeleton-text>
                    </ion-thumbnail>
                    <ion-label>
                      <h3>
                        <ion-skeleton-text [animated]="true" style="width: 80%;"></ion-skeleton-text>
                      </h3>
                      <h3>
                        <ion-skeleton-text [animated]="true" style="width: 80%;"></ion-skeleton-text>
                      </h3>
                      <h3>
                        <ion-skeleton-text [animated]="true" style="width: 80%;"></ion-skeleton-text>
                      </h3>
                    </ion-label>
                  </ion-item>

                   
                </ion-list>
              </ion-col>
            </ion-row>
          </ion-card-content>
        </ion-card>
      </ion-col>

      <ion-col size="12" *ngIf="!loading">
        <ion-card class="card-venta slide-in-left">
          <ion-card-content>
            <form *ngIf="ventaData != null" [formGroup]="form">
              <ion-row class="margin-bottom-2 ion-justify-content-end">
                <ion-col size="auto">
                  <ion-label>Fecha: {{ventaData?.fecha_creacion | date: 'short'}}</ion-label>
                </ion-col>
              </ion-row>

              <ion-row>
                <ion-col>
                  <ion-select color="primary" fill="outline" [disabled]="true" formControlName="estado" label="Estado" labelPlacement="stacked">
                    <ion-select-option value="Pendiente">
                      Pendiente
                    </ion-select-option>

                    <ion-select-option value="Pagado">
                      Pagado
                    </ion-select-option>
                  </ion-select>
                </ion-col>
              </ion-row>

              <ion-row class="margin-top-1 ion-justify-content-center" *ngIf="ventaData?.pagos?.length > 0">

                <ion-col size="12">
                  <ion-row class="margin-top-1 ion-justify-content-space-between">
                    <ion-col size="12">
                    <ion-label color="primary">Información de Pago: </ion-label>
                    </ion-col>
                  </ion-row>

                  <ion-row class="ion-justify-content-space-between" *ngFor="let pago of ventaData?.pagos">
                    <ion-col size="6">
                      {{pago.metodo}}
                    </ion-col>
                    <ion-col size="auto">
                      <span *ngIf="pago.metodo != 'Divisas'">Bs. </span>{{pago.monto.toFixed(2)}}
                    </ion-col>
                  </ion-row>
                </ion-col>
              </ion-row>


              <ion-row class="ion-justify-content-center">

                <ion-col size="12">
                  <ion-row class="margin-top-1 ion-justify-content-space-between">
                    <ion-col size="12">
                    <ion-label color="primary">Totales: </ion-label>
                    </ion-col>
                  </ion-row>

                  <ion-row class="ion-justify-content-space-between">
                    <ion-col size="6">
                      Total Bs:
                    </ion-col>
                    <ion-col size="auto">
                      {{ventaData.total.toFixed(2)}}
                    </ion-col>
                  </ion-row>

                  <ion-row class="ion-justify-content-space-between">
                    <ion-col size="6">
                      Total USD: 
                    </ion-col>
                    <ion-col size="auto">
                      ${{ventaData.total_usd.toFixed(2)}}
                    </ion-col>
                  </ion-row>

                  <ion-row class="ion-justify-content-center">
                    <ion-col size="6">
                      <ion-label color="tertiary" class="text-center d-block">Tasa: 450 Bs</ion-label>
                    </ion-col>
                  </ion-row>
                </ion-col>
              </ion-row>


              <ion-accordion-group [value]="'first'">
                <ion-accordion value="first" >
                  <ion-item slot="header"  class="header-accordion" >
                    <ion-label><ion-icon name="bag-handle"></ion-icon> Productos: </ion-label>
                  </ion-item>
                  <div class="padding-top-1 body-accordion" slot="content">
                        <ion-row class="ion-align-items-start" *ngFor="let item of ventaData.lines">
                            <product-card [sm]="true" [product]="item" [hideDisponible]="true" [hover]="false"></product-card>
                        </ion-row>
                  </div>
                </ion-accordion>
                <ion-accordion value="second">
                  <ion-item slot="header" class="header-accordion">
                    <ion-label><ion-icon name="person"></ion-icon> Datos del cliente</ion-label>
                  </ion-item>
                  <div slot="content" class="padding-1 body-accordion">
                    <ion-row class="margin-top-1">
                      <ion-col>
                        <app-input label="Nombre cliente" type="text" [controlName]="form.controls['cliente']"></app-input>
                      </ion-col>
                    </ion-row>
      
                    <ion-row class="margin-top-1">
                      <ion-col>
                        <app-input label="Contacto cliente" type="text" [controlName]="form.controls['contacto']"></app-input>
                      </ion-col>
                    </ion-row>
                  </div>
                </ion-accordion>
              </ion-accordion-group>
            </form>
          </ion-card-content>
        </ion-card>
      </ion-col>
    </ion-row>
  </ion-grid>
</ion-content>
