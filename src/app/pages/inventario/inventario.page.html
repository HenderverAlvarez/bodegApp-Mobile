<ion-content [fullscreen]="true">

  <app-header title="Inventario"></app-header>

  <ion-grid class="margin-top-4 text-center">


    <ion-row *ngIf="!showInventario && !showCategorias" class="ion-justify-content-center margin-top-1 slide-in-left">
      <ion-col size="10">

        <div class="card-nav" (click)="openModal()" >
          <p class="card-title">Registrar Producto</p>
          <p class="small-desc">
            Registra un nuevo producto en tu inventario.
          </p>
          <div class="go-corner">
            <div class="go-arrow">
              <ion-icon size="large" name="arrow-forward-circle-outline"></ion-icon>
            </div>
          </div>
        </div>

      </ion-col>
    </ion-row>

    <ion-row *ngIf="!showInventario && !showCategorias" class="ion-justify-content-center margin-top-1 slide-in-right">
      <ion-col size="10">

        <div class="card-nav" (click)="setShowCategorias()">
          <p class="card-title">Inventario</p>
          <p class="small-desc">
            Consulta Los productos de tu inventario y modifica detalles.
          </p>
          <div class="go-corner">
            <div class="go-arrow">
              <ion-icon size="large" name="arrow-forward-circle-outline"></ion-icon>
            </div>
          </div>
        </div>
     
      </ion-col>
    </ion-row>

    <ion-row *ngIf="!showInventario && showCategorias"  class="ion-justify-content-space-between margin-top-1">
      <ion-col size="auto">
         <div>
           <ion-chip (click)="setShowCategorias()" color="primary"><ion-icon class="margin-right-2" name="arrow-back"></ion-icon> Regresar</ion-chip>
         </div>
      </ion-col>
   </ion-row>


    <ion-row *ngIf="!showInventario && showCategorias" class="ion-justify-content-center margin-top-1 slide-in-left">
      <ion-col size="10">
        <div class="card-nav" (click)="setShowInventario()" >
          <p class="card-title">Todos</p>
          <p class="small-desc">
            Ver todos tus productos.
          </p>
          <div class="go-corner">
            <div class="go-arrow">
              <ion-icon size="large" name="arrow-forward-circle-outline"></ion-icon>
            </div>
          </div>
        </div>
      </ion-col>
    </ion-row>

    <ion-row *ngIf="!showInventario && showCategorias" class="ion-justify-content-center slide-in-left">
      <ion-col size="10">
        <div class="card-nav" (click)="setShowInventario()" >
          <p class="card-title">Charcuteria</p>
          <p class="small-desc">
            Productos de charcuteria.
          </p>
          <div class="go-corner">
            <div class="go-arrow">
              <ion-icon size="large" name="arrow-forward-circle-outline"></ion-icon>
            </div>
          </div>
        </div>
      </ion-col>
    </ion-row>

    <ion-row *ngIf="!showInventario && showCategorias" class="ion-justify-content-center slide-in-right">
      <ion-col size="10">
        <div class="card-nav" (click)="setShowInventario()">
          <p class="card-title">Víveres</p>
          <p class="small-desc">
            Viveres.
          </p>
          <div class="go-corner">
            <div class="go-arrow">
              <ion-icon size="large" name="arrow-forward-circle-outline"></ion-icon>
            </div>
          </div>
        </div>
      </ion-col>
    </ion-row>

    <ion-row *ngIf="!showInventario && showCategorias" class="ion-justify-content-center slide-in-right">
      <ion-col size="10">
        <div class="card-nav" (click)="setShowInventario()">
          <p class="card-title">Lacteos</p>
          <p class="small-desc">
            Productos Lacteos.
          </p>
          <div class="go-corner">
            <div class="go-arrow">
              <ion-icon size="large" name="arrow-forward-circle-outline"></ion-icon>
            </div>
          </div>
        </div>
      </ion-col>
    </ion-row>



    <ion-row *ngIf="showInventario"  class="ion-justify-content-space-between margin-top-1">
      <ion-col size="auto">
         <div>
           <ion-chip (click)="setShowInventario()" color="primary"><ion-icon class="margin-right-2" name="arrow-back"></ion-icon> Regresar</ion-chip>
         </div>
      </ion-col>
   </ion-row>

    <inventario-lista *ngIf="showInventario" ></inventario-lista>
  </ion-grid>


</ion-content>
